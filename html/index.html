<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="../css/tailwind.css">
</head>
<body>
    <div class="min-h-screen pb-20">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-gradient-to-b from-orange-50 to-orange-100 border-b border-orange-200">
            <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">💰 Expense Tracker</h1>
                <button id="themeToggle" class="p-2 rounded-lg bg-white hover:bg-gray-100 transition-colors shadow-md" title="Toggle dark mode">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">
            
            <!-- Balance Card -->
            <section class="container-card">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="text-center p-4 bg-blue-50 rounded-lg">
                        <p class="text-sm text-muted font-semibold mb-1">Total Balance</p>
                        <p class="text-3xl font-bold text-blue-600">Rp <span id="totalBalance">0</span></p>
                    </div>
                    <div class="text-center p-4 bg-green-50 rounded-lg">
                        <p class="text-sm text-muted font-semibold mb-1">Income</p>
                        <p class="text-3xl font-bold text-green-600">Rp <span id="totalIncome">0</span></p>
                    </div>
                    <div class="text-center p-4 bg-red-50 rounded-lg">
                        <p class="text-sm text-muted font-semibold mb-1">Expenses</p>
                        <p class="text-3xl font-bold text-red-600">Rp <span id="totalExpenses">0</span></p>
                    </div>
                </div>
            </section>

            <!-- Add Transaction Form -->
            <section class="container-card">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Add Transaction</h2>
                <form id="transactionForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <input type="text" id="description" placeholder="e.g., Coffee" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Amount (Rp)</label>
                            <input type="number" id="amount" placeholder="0" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                            <select id="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Select Category</option>
                                <option value="food">🍔 Food</option>
                                <option value="transport">🚗 Transport</option>
                                <option value="utilities">💡 Utilities</option>
                                <option value="entertainment">🎬 Entertainment</option>
                                <option value="healthcare">⚕️ Healthcare</option>
                                <option value="shopping">🛍️ Shopping</option>
                                <option value="other">📌 Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                            <select id="type" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                        <input type="date" id="date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button type="submit" class="w-full px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                        Add Transaction
                    </button>
                </form>
            </section>

            <!-- Controls Section -->
            <section class="container-card flex flex-wrap gap-3 justify-between items-center">
                <div class="flex gap-2 flex-wrap">
                    <button id="sortBtn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium rounded-lg transition-colors" title="Sort transactions">
                        📊 Sort
                    </button>
                    <button id="monthlyViewBtn" class="px-4 py-2 bg-purple-200 hover:bg-purple-300 text-purple-800 font-medium rounded-lg transition-colors">
                        📅 Monthly
                    </button>
                </div>
                <button id="clearBtn" class="px-4 py-2 bg-red-200 hover:bg-red-300 text-red-800 font-medium rounded-lg transition-colors">
                    🗑️ Clear All
                </button>
            </section>

            <!-- Monthly View Section (Hidden by default) -->
            <section id="monthlyView" class="container-card hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Monthly Summary</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <button id="prevMonth" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium">← Previous</button>
                    <button id="nextMonth" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium">Next →</button>
                </div>
                <p id="monthDisplay" class="text-center text-lg font-semibold text-gray-700 mb-4"></p>
                <div id="monthlySummary" class="space-y-3"></div>
            </section>

            <!-- Chart Section -->
            <section class="container-card">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Expenses by Category</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <canvas id="expenseChart" class="w-full"></canvas>
                    </div>
                    <div id="chartLegend" class="space-y-2"></div>
                </div>
            </section>

            <!-- Transaction History -->
            <section class="container-card">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Transaction History</h2>
                <div id="transactionList" class="space-y-3">
                    <p class="text-gray-500 text-center py-8">No transactions yet. Add one to get started!</p>
                </div>
            </section>

        </main>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
