<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Expense & Budget Visualizer</p>
        <h1>Track your daily spending</h1>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">Dark mode</button>
    </header>

    <section class="balance-card">
      <p class="balance-label">TOTAL BALANCE</p>
      <p id="totalBalance" class="balance-value">$0.00</p>
    </section>

    <section class="panel card summary-row">
      <div>
        <p class="summary-label">Current month total</p>
        <p id="monthlyTotal" class="summary-value">$0.00</p>
      </div>
      <div>
        <p class="summary-label">Transactions this month</p>
        <p id="monthlyItems" class="summary-value">0</p>
      </div>
      <div>
        <p class="summary-label">Alert threshold</p>
        <p id="thresholdValue" class="summary-value">None</p>
      </div>
    </section>

    <section class="panel card">
      <h2>Add Transaction</h2>
      <form id="transactionForm" class="transaction-form">
        <label>
          Item Name
          <input id="itemName" name="itemName" type="text" placeholder="Coffee, Taxi, Movie" />
        </label>

        <label>
          Amount
          <input id="itemAmount" name="itemAmount" type="number" min="0.01" step="0.01" placeholder="14.99" />
        </label>

        <label>
          Category
          <select id="itemCategory" name="itemCategory">
            <option value="">Select category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </label>

        <label>
          Date
          <input id="itemDate" name="itemDate" type="date" />
        </label>

        <p id="transactionError" class="form-error" aria-live="polite"></p>
        <button class="button-primary" type="submit">Add Transaction</button>
      </form>
    </section>

    <section class="panel card manage-categories-panel">
      <div class="panel-header">
        <h2>Manage Categories</h2>
        <span class="meta-text">Add a custom category or set highlight limit here</span>
      </div>
      <p id="manageCategoryError" class="form-error" aria-live="polite"></p>
      <label>
        Add custom category
        <div class="category-add-row">
          <input id="newCategoryName" type="text" placeholder="New category" />
          <button id="addCategoryButton" class="button-secondary" type="button">Add</button>
        </div>
      </label>
      <label>
        Highlight limit
        <div class="category-add-row">
          <input id="spendLimit" name="spendLimit" type="number" min="0" step="1" placeholder="e.g. 50" />
          <button id="saveLimitButton" class="button-secondary" type="button">Set</button>
        </div>
      </label>
      <div id="categoryList" class="category-list"></div>
    </section>

    <section class="grid-layout">
      <div class="panel card transactions-panel">
        <div class="panel-header">
          <h2>Transactions</h2>
          <span id="transactionCount" class="meta-text">0 items</span>
        </div>
        <div class="controls-row">
          <div class="month-navigation">
            <button id="prevMonth" type="button">←</button>
            <span id="currentMonthLabel">This month</span>
            <button id="nextMonth" type="button">→</button>
          </div>
          <label class="sort-select">
            Sort by
            <select id="sortSelect">
              <option value="date_desc">Date newest</option>
              <option value="date_asc">Date oldest</option>
              <option value="amount_desc">Amount high to low</option>
              <option value="amount_asc">Amount low to high</option>
              <option value="category_asc">Category A - Z</option>
              <option value="category_desc">Category Z - A</option>
            </select>
          </label>
        </div>
        <div id="transactionList" class="transaction-list"></div>
      </div>

      <div class="panel card chart-panel">
        <div class="panel-header">
          <h2>Spending by Category</h2>
        </div>
        <canvas id="categoryChart" aria-label="Spending distribution by category" role="img"></canvas>
      </div>
    </section>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
